    description : >
      Practical systems that reduce manual work, improve repeatability, or connect
      existing equipment into a more reliable workflow.

  - icon  : tf-ion-ios-settings
    title : Hardware Integration
    description : >
      Sensors, actuators, controllers, embedded systems, test rigs, and interfaces
      brought together around the equipment you already use.

  - icon  : tf-ion-ios-flask-outline
    title : Engineering Prototypes
    description : >
      One-off devices, measurement fixtures, proof-of-concept builds, and
      prototypes for unusual engineering requirements.

  - icon  : tf-ion-ios-lightbulb-outline
    title : AI Tool Implementation
    description : >
      Consultation and implementation support for applying AI tools inside company
      processes without losing sight of reliability, data, and adoption.

  - icon  : tf-ion-ios-pulse
    title : Measurement Devices
    description : >
      Custom devices and data capture setups for teams that need to measure,
      monitor, log, or trigger something specific.

  - icon  : tf-ion-wrench
    title : On-Demand Solutions
    description : >
      Technical advice, feasibility work, and build support when the problem does
      not fit a standard product or off-the-shelf service.
