enable  : true
topTitle: HOW WE WORK
title   : A practical route from idea to implementation
subtitle: Clear scoping first, then prototypes, tests, and integration.
item    :
  - number  : 1
    icon    : tf-ion-ios-search-strong
    title   : Scope
    description : >
      Define the problem, constraints, environment, and what success should look
      like before committing to a build.

  - number  : 2
    icon    : tf-ion-ios-gear-outline
    title   : Design and Prototype
    description : >
      Sketch the solution, choose hardware and software, and build enough to
      prove the important parts.

  - number  : 3
    icon    : tf-ion-ios-flask-outline
    title   : Test
    description : >
      Check measurement quality, reliability, safety, usability, and integration
      risks before wider use.

  - number  : 4
    icon    : tf-ion-ios-checkmark-outline
    title   : Implement
    description : >
      Install, document, train, and refine the solution so it can be used by the
      people who need it.
