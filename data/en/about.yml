    title : Built around the problem, not a catalogue
    description : >
      Lomond Robotics works on practical engineering problems where a standard
      service is not enough: automating chemistry and biochemistry workflows,
      integrating lab instruments, building custom measurement hardware,
      processing data, or supplying and setting up a complete working system
      from scratch.
