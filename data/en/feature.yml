enable  : true
item  :
  - icon  : tf-ion-ios-settings
    title : Hardware Implementation
    description : >
      Design and build of custom hardware: sensors, actuators, controllers,
      embedded systems, and instrument interfaces built around your specific
      equipment and environment.

  - icon  : tf-ion-ios-flask-outline
    title : Chemistry & Biochemistry Automation
    description : >
      Automation of lab workflows including liquid handling, sample processing,
      instrument control, and repetitive assay steps — reducing manual effort
      and improving reproducibility.

  - icon  : tf-ion-ios-pulse
    title : Data Processing & Analysis
    description : >
      Custom pipelines for capturing, cleaning, storing, and visualising
      measurement data from instruments, sensors, or lab equipment.

  - icon  : tf-ion-ios-cog
    title : On-Demand Instrument Setup
    description : >
      Full turnkey supply: sourcing, configuring, integrating, and handing over
      a complete working instrument or system — so you get one point of contact
      from spec to sign-off.

  - icon  : tf-ion-ios-lightbulb-outline
    title : AI Tool Implementation
    description : >
      Practical AI integration into lab and engineering processes — data
      interpretation, workflow assistance, and decision support without
      sacrificing reliability or auditability.

  - icon  : tf-ion-wrench
    title : Engineering Prototypes
    description : >
      One-off devices, proof-of-concept builds, measurement fixtures, and
      custom hardware for requirements that do not fit any off-the-shelf product.
