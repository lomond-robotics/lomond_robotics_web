{{ if .Site.Params.contact.enable }}
<section class="contact-us section bg-gray" id="contact">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8">
                {{ with .Site.Params.contact.title }}<h2 class="text-center mb-2">{{.}}</h2>{{ end }}
                {{ with .Site.Params.contact.subtitle }}<p class="text-center mb-4">{{.}}</p>{{ end }}
                <form id="contact-form" method="POST" action="{{ site.Params.contact_form_action }}" role="form">
                    <input type="hidden" name="_subject" value="New enquiry — Lomond Robotics">
                    <div class="form-group">
                        <input type="text" placeholder="Your Name" class="form-control" name="name" id="name" required>
                    </div>
                    <div class="form-group">
                        <input type="email" placeholder="Your Email" class="form-control" name="_replyto" id="email" required>
                    </div>
                    <div class="form-group">
                        <input type="text" placeholder="Subject" class="form-control" name="subject" id="subject">
                    </div>
                    <div class="form-group">
                        <textarea rows="6" placeholder="Message" class="form-control" name="message" id="message" required></textarea>
                    </div>
                    <div class="text-center">
                        <input type="submit" class="btn btn-main" value="Send message">
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{{ end }}
